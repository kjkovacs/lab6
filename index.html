<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>projekt</title>
  </head>
  <body>
    <div class="max-w-3xl mx-auto p-4">
      <h1 class="text-3xl font-bold mb-6">Artykuły</h1>
      <div id="articles-list" class="space-y-6"></div>
      
      <h2 class="text-2xl font-bold mt-12 mb-4">Dodaj nowy artykuł</h2>
      <form id="add-article-form" class="flex flex-col space-y-3">
        <input type="text" id="title" placeholder="Tytuł" class="border p-2 rounded" required />
        <input type="text" id="subtitle" placeholder="Podtytuł" class="border p-2 rounded" required />
        <input type="text" id="author" placeholder="Autor" class="border p-2 rounded" required />
        <textarea id="content" placeholder="Treść" class="border p-2 rounded" required></textarea>
        <button type="submit" class="bg-blue-500 text-white p-2 rounded">Dodaj</button>
      </form>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
